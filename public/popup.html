<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Recent Enhancer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #000;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #eaeaea;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #000;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.85;
    }
    .status {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .status.show {
      opacity: 1;
    }
    .status.success {
      color: #000;
    }
    .status.error {
      color: #cf222e;
    }
  </style>
</head>
<body>
  <h1>GitHub Recent Enhancer</h1>
  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="your-username">
  </div>
  <div class="field">
    <label for="token">Token</label>
    <input type="password" id="token" placeholder="ghp_xxxx">
  </div>
  <button id="save">Save</button>
  <div class="status" id="status">Saved</div>
  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
