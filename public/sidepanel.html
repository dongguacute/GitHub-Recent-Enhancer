<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recent Activity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #24292f;
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      flex-shrink: 0;
      padding: 16px;
      border-bottom: 1px solid #d0d7de;
      background: #f6f8fa;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .settings-toggle {
      font-size: 12px;
      color: #0969da;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .settings-toggle:hover { text-decoration: underline; }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #d0d7de;
    }
    .settings.hidden { display: none; }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 12px;
      color: #57606a;
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      padding: 6px 12px;
      font-size: 13px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
    }
    .field input:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.2);
    }
    .btn {
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #d0d7de;
      background: #f6f8fa;
    }
    .btn:hover { background: #eaeef2; }
    .btn-primary {
      background: #238636;
      color: #fff;
      border-color: #238636;
    }
    .btn-primary:hover { background: #2ea043; }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #57606a;
    }
    .stat { display: flex; align-items: center; gap: 4px; }
    .stat-pr { color: #8957e5; }
    .stat-issue { color: #238636; }
    .list { list-style: none; }
    .item {
      padding: 8px 0;
      border-bottom: 1px solid #d0d7de;
    }
    .item:last-child { border-bottom: none; }
    .item a {
      display: flex;
      gap: 8px;
      text-decoration: none;
      color: inherit;
    }
    .item a:hover .item-title { color: #0969da; text-decoration: underline; }
    .item-icon { flex-shrink: 0; margin-top: 2px; }
    .item-icon.open,
    .item-icon.issue { color: #238636; }
    .item-content { flex: 1; min-width: 0; }
    .item-title {
      font-size: 14px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .item-repo { font-size: 12px; color: #57606a; margin-top: 2px; }
    .loading, .error, .empty {
      padding: 24px;
      text-align: center;
      color: #57606a;
    }
    .error { color: #cf222e; }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #d0d7de;
      border-top-color: #0969da;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 12px; margin-top: 8px; }
    .status.success { color: #238636; }
    .status.error { color: #cf222e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Recent Activity</h1>
    <button type="button" class="settings-toggle" id="settings-toggle">Settings</button>
    <div class="settings hidden" id="settings">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="your-username">
      </div>
      <div class="field">
        <label for="token">Token</label>
        <input type="password" id="token" placeholder="ghp_xxxx">
      </div>
      <button type="button" class="btn btn-primary" id="save">Save</button>
      <div class="status" id="status"></div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 8px;">Loading...</p>
    </div>
  </div>
  <script type="module" src="/src/sidepanel.ts"></script>
</body>
</html>
